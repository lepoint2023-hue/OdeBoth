<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00407a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ode · Assistant Sainte-Ode</title>
<!-- ✅ FIX: preconnect pour réduire la latence du chargement des polices -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- ═══ STYLES ═══ -->
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0056A4;--blue-dark:#00407a;--blue-mid:#1a6bbf;
  --blue-light:#e6f0fb;--blue-pale:#f0f6fd;
  --gold:#e8a020;--gold-light:#f5c860;
  --white:#fff;--ink:#0d1e30;--gray:#eef2f7;
  --gray-mid:#8da4be;--gray-bd:#cdd9e8;--green:#1aab72;
  --r:16px;
  --sh-sm:0 2px 12px rgba(0,64,122,.10);
  --sh-lg:0 14px 60px rgba(0,64,122,.22);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--blue-dark);
  display:flex;flex-direction:column;
  background-image:
    radial-gradient(ellipse 80% 60% at 15% 80%,rgba(0,86,164,.5) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 10%,rgba(232,160,32,.12) 0%,transparent 55%);
}

/* HEADER */
.page-header{display:flex;align-items:center;gap:12px;padding:12px 16px 0;flex-shrink:0}
.commune-logo{width:44px;height:44px;border-radius:10px;background:var(--white);padding:3px;box-shadow:0 2px 8px rgba(0,0,0,.15);overflow:hidden;flex-shrink:0}
.commune-logo img{width:100%;height:100%;object-fit:contain;display:block}
.commune-info h1{font-family:'Sora',sans-serif;font-size:17px;font-weight:600;color:var(--white);line-height:1.2}
.commune-info p{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.status-badge{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:#6fcf97;background:rgba(111,207,151,.12);padding:4px 10px;border-radius:20px;border:1px solid rgba(111,207,151,.25);white-space:nowrap}
.status-dot{width:6px;height:6px;border-radius:50%;background:#6fcf97;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LANG */
.lang-row{display:flex;gap:6px;padding:7px 16px 0;flex-shrink:0;flex-wrap:wrap}
.lang-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.65);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 10px;border-radius:14px;cursor:pointer;transition:all .15s;min-height:30px}
.lang-btn.active,.lang-btn:hover{background:rgba(255,255,255,.25);color:#fff;border-color:rgba(255,255,255,.5)}

/* CHAT SHELL */
main{flex:1;min-height:0;display:flex;flex-direction:column}
.chat-wrap{flex:1;display:flex;flex-direction:column;margin:8px 12px 10px;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-lg);min-height:0}

/* TOP BAR */
.chat-topbar{background:var(--blue);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.bot-avatar{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.bot-avatar img{width:24px;height:24px;object-fit:contain;display:block}
.bot-name{font-family:'Sora',sans-serif;font-size:13px;font-weight:500;color:#fff;line-height:1.2}
.bot-sub{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.svc-pill{margin-left:auto;font-size:10px;font-weight:500;padding:3px 8px;border-radius:10px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.25);display:none;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.svc-pill.on{display:block}
.reset-btn{background:none;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;transition:all .15s;flex-shrink:0;white-space:nowrap}
.reset-btn:hover{color:#fff;border-color:rgba(255,255,255,.6)}

/* MESSAGES */
.msgs{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:12px;display:flex;flex-direction:column;gap:11px;background:var(--blue-pale);-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--gray-bd);border-radius:2px}
.msg-row{display:flex;gap:7px;align-items:flex-end;opacity:0;transform:translateY(6px);animation:fadeUp .25s ease forwards;min-width:0;max-width:100%}
.msg-row.user{flex-direction:row-reverse}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.av{width:26px;height:26px;border-radius:7px;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.av img{width:18px;height:18px;object-fit:contain;display:block}
.av svg{width:13px;height:13px;fill:#fff}
.av.u{background:var(--gray)}
.av.u svg{fill:var(--blue)}
.bbl{max-width:min(82%,calc(100vw - 76px));padding:9px 13px;border-radius:13px;font-size:14px;line-height:1.65;color:var(--ink);word-break:break-word;overflow-wrap:anywhere;overflow-wrap:anywhere;overflow-wrap:break-word}
.bbl.bot{background:var(--white);border:1px solid var(--gray-bd);border-bottom-left-radius:3px;box-shadow:var(--sh-sm)}
.bbl.user{background:var(--blue);color:#fff;border-bottom-right-radius:3px}
.bbl strong{font-weight:500;color:var(--blue)}
.bbl.user strong{color:var(--gold-light)}
.bbl a{color:var(--blue);text-decoration:underline;word-break:break-all}
.bbl.user a{color:var(--gold-light)}
.bbl ul{padding-left:15px;margin-top:5px}
.bbl li{margin-bottom:3px}
.bbl.rtl{direction:rtl;text-align:right;font-family:sans-serif}
/* Wrapper interne : bot à gauche, user à droite */
.msg-row>div{display:flex;flex-direction:column;align-items:flex-start}
.msg-row.user>div{align-items:flex-end}

/* SERVICE SELECTOR */
.svc-selector{background:var(--white);border:1px solid var(--gray-bd);border-radius:13px;padding:12px;box-shadow:var(--sh-sm);opacity:0;animation:fadeUp .3s ease forwards;max-height:45vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.svc-selector-title{font-size:11px;color:var(--gray-mid);margin-bottom:9px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.svc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
@media(min-width:520px){.svc-grid{grid-template-columns:repeat(3,1fr)}}
.svc-btn{display:flex;align-items:center;gap:7px;padding:9px 10px;background:var(--blue-pale);border:1.5px solid transparent;border-radius:9px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--ink);text-align:left;transition:all .15s;-webkit-tap-highlight-color:transparent}
.svc-btn:active,.svc-btn:hover{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark)}
.svc-icon{font-size:16px;flex-shrink:0;line-height:1}

/* QUICK REPLIES */
.qr-wrap{display:flex;flex-wrap:nowrap;gap:6px;margin-top:7px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.qr-wrap::-webkit-scrollbar{display:none}
.qr-btn{background:var(--white);border:1.5px solid var(--blue);color:var(--blue);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.qr-btn:active,.qr-btn:hover{background:var(--blue);color:#fff}

/* TYPING */
.typing-row{display:flex;gap:7px;align-items:flex-end;opacity:0;animation:fadeUp .25s ease forwards}
.typing-bbl{background:var(--white);border:1px solid var(--gray-bd);border-radius:13px;border-bottom-left-radius:3px;padding:11px 14px;display:flex;gap:4px;align-items:center;box-shadow:var(--sh-sm)}
.t-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-mid);animation:bounce 1.2s infinite}
.t-dot:nth-child(2){animation-delay:.2s}
.t-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}

/* INPUT */
.input-bar{padding:10px 12px;background:var(--white);border-top:1px solid var(--gray-bd);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
#chat-input{flex:1;border:1.5px solid var(--gray-bd);border-radius:22px;padding:9px 14px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);outline:none;transition:border-color .2s;background:var(--blue-pale);resize:none;max-height:80px;overflow-y:auto;line-height:1.4}
#chat-input:focus{border-color:var(--blue);background:#fff}
#chat-input::placeholder{color:var(--gray-mid)}
.send-btn{width:42px;height:42px;border-radius:12px;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.send-btn:hover{background:var(--blue-mid)}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{background:var(--gray);cursor:not-allowed;transform:none}
.send-btn svg{width:16px;height:16px;fill:#fff}

/* FOOTER */
.page-footer{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;padding:7px 16px 10px;flex-shrink:0}
.foot-chip{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.3)}
.foot-chip svg{width:11px;height:11px;fill:currentColor;flex-shrink:0}
.foot-chip a{color:rgba(255,255,255,.45);text-decoration:underline}
.ts{font-size:11px;color:var(--gray-mid);text-align:center;padding:2px 0}


/* PHONE BUTTON */
.phone-btn{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:10px;
  background:rgba(26,171,114,.2);border:1.5px solid rgba(26,171,114,.4);
  color:#6fcf97;cursor:pointer;transition:all .15s;flex-shrink:0;
  text-decoration:none;
  -webkit-tap-highlight-color:transparent;
}
.phone-btn:hover{background:rgba(26,171,114,.35);border-color:#6fcf97}
.phone-btn svg{width:16px;height:16px;fill:currentColor}


/* Welcome message compact */
.bbl.welcome{font-size:13px;padding:8px 12px;background:var(--blue-light);border-color:var(--blue);color:var(--blue-dark)}

/* HORAIRES BANNER */
.horaires-banner{display:flex;align-items:center;gap:6px;margin-left:auto;font-size:13px;font-weight:600;white-space:nowrap}
.horaires-banner.ouvert{color:#6fcf97}
.horaires-banner.ferme{color:#f2994a}
.horaires-banner.bientot{color:#f2c94c}
.horaires-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ouvert .horaires-dot{background:#6fcf97;animation:pulse 2s infinite}
.ferme .horaires-dot{background:#f2994a}
.bientot .horaires-dot{background:#f2c94c;animation:pulse 1s infinite}

/* FEEDBACK 👍👎 */
.feedback-wrap{display:flex;gap:6px;margin-top:6px;align-items:center}
.fb-btn{background:none;border:1.5px solid var(--gray-bd);border-radius:20px;padding:3px 10px;font-size:12px;cursor:pointer;transition:all .15s;color:var(--gray-mid)}
.fb-btn:hover{border-color:var(--blue);color:var(--blue)}
.fb-btn.liked{background:#e8f5e9;border-color:#1aab72;color:#1aab72}
.fb-btn.disliked{background:#fdecea;border-color:#e53935;color:#e53935}
.fb-done{font-size:11px;color:var(--gray-mid);padding:2px 4px}

/* ALERTE BOUTON */
.alert-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(235,87,87,.15);border:1.5px solid rgba(235,87,87,.4);
  color:#eb5757;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  padding:5px 11px;border-radius:20px;cursor:pointer;
  transition:all .15s;flex-shrink:0;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.alert-btn:hover{background:rgba(235,87,87,.25);border-color:#eb5757}
.alert-dot{width:7px;height:7px;border-radius:50%;background:#eb5757;animation:pulse 1s infinite;flex-shrink:0}

/* STATUS badge colors */
.status-badge.offline{color:#f2994a;background:rgba(242,153,74,.12);border-color:rgba(242,153,74,.25)}
.status-badge.offline .status-dot{background:#f2994a}
.status-badge.quota{color:#f2994a;background:rgba(242,153,74,.12);border-color:rgba(242,153,74,.25)}
.status-badge.quota .status-dot{background:#f2994a;animation:none}

/* Modal overlay — div fixe, fiable sur tous les navigateurs mobiles */
#alert-overlay{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.6);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:20px 16px;
  align-items:flex-start;justify-content:center;
}
#alert-overlay.open{display:flex}
#alert-dialog{
  background:#fff;border-radius:16px;padding:20px;
  max-width:420px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  margin:auto;flex-shrink:0;
}
/* Boutons d'items dans la modale — CSS centralisé (plus d'inline onmouseover) */
.alert-item-btn{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  border:1.5px solid var(--gray-bd);background:var(--blue-pale);
  cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;color:var(--ink);
  text-align:left;transition:all .15s;width:100%;
}
.alert-item-btn:hover,.alert-item-btn:focus{border-color:#eb5757;background:#fdecea}
.alert-vital-badge{
  margin-left:auto;font-size:10px;
  background:#fff3e0;color:#f2994a;
  padding:2px 6px;border-radius:10px;white-space:nowrap;
}
.alert-cancel-btn{
  margin-top:14px;width:100%;padding:10px;
  border-radius:10px;border:1.5px solid var(--gray-bd);
  background:none;font-family:'DM Sans',sans-serif;
  font-size:13px;color:var(--gray-mid);cursor:pointer;
  transition:border-color .15s;
}
.alert-cancel-btn:hover{border-color:var(--gray-mid)}

/* MOBILE */

@media(max-width:600px){
  html,body{height:auto;overflow:auto}
  body{min-height:100svh}
  .chat-wrap{flex:none;min-height:0}
  .msgs{flex:none;height:auto;max-height:55vh}
}
@media(max-width:480px){
  html,body{height:auto;overflow:auto}
  body{min-height:100svh}
  .page-header{padding:9px 12px 0}
  .commune-info h1{font-size:15px}
  .commune-logo{width:38px;height:38px}
  .lang-row{padding:6px 12px 0}
  .chat-wrap{flex:none;margin:7px 8px 8px;border-radius:14px;min-height:0}
  .msgs{flex:none;height:auto;min-height:200px;max-height:60vh}
  .bot-sub{display:none}
  .bbl{font-size:13px;max-width:calc(100vw - 80px);overflow-wrap:anywhere}
  .page-footer{padding:5px 12px 8px;gap:10px}
}
@media(max-height:620px){
  .page-header{display:none}
  .lang-row{padding-top:6px}
}
@media(min-width:860px){
  body{padding:0 20px}
  .page-header,.lang-row{max-width:800px;margin-left:auto;margin-right:auto;width:100%}
  .chat-wrap{max-width:800px;margin-left:auto;margin-right:auto}
  .page-footer{padding-bottom:14px}
}
</style>
</head>
<body>

<!-- ✅ FIX: noscript fallback si JS désactivé -->
<noscript>
  <div style="font-family:sans-serif;padding:20px;color:#0d1e30;background:#f0f6fd;text-align:center">
    <strong>Commune de Sainte-Ode</strong><br>
    L'assistant Ode nécessite JavaScript.<br><br>
    📞 <a href="tel:+3261210440">+32 61 21 04 40</a> &nbsp;|&nbsp;
    📧 <a href="mailto:info@sainte-ode.be">info@sainte-ode.be</a>
  </div>
</noscript>

<!-- HEADER -->
<div class="page-header">
  <div class="commune-logo" id="header-logo"></div>
  <div class="commune-info">
    <h1>Sainte-Ode</h1>
    <p id="header-sub">Service Population &middot; Assistant IA &middot; 24h/24</p>
  </div>
  <div class="status-badge">
    <div class="status-dot"></div>
    <span id="status-label">En ligne</span>
  </div>
</div>

<!-- LANGUES -->
<div class="lang-row">
  <!-- ✅ FIX: drapeaux corrigés — 🇫🇷 pour FR, 🇳🇱 pour NL -->
  <button class="lang-btn active" onclick="setLang('fr')">&#127467;&#127479; FR</button>
  <button class="lang-btn" onclick="setLang('nl')">&#127475;&#127473; NL</button>
  <button class="lang-btn" onclick="setLang('en')">&#127468;&#127463; EN</button>
  <button class="lang-btn" onclick="setLang('de')">&#127465;&#127466; DE</button>
  <button class="lang-btn" onclick="setLang('es')">&#127466;&#127480; ES</button>
  <button class="lang-btn" onclick="setLang('ar')">&#127480;&#127462; &#1593;&#1585;</button>
  <div class="horaires-banner" id="horaires-banner" aria-live="polite"><div class="horaires-dot"></div><span id="horaires-text">...</span></div>
</div>

<!-- ✅ FIX: balise <main> sémantique autour du chat -->
<main aria-label="Assistant Ode">
  <div class="chat-wrap">
    <div class="chat-topbar">
      <div class="bot-avatar" id="topbar-logo"></div>
      <div>
        <div class="bot-name" id="bot-name-label">Ode &middot; Assistante Communale</div>
        <div class="bot-sub">Commune de Sainte-Ode &middot; Province de Luxembourg</div>
      </div>
      <span class="svc-pill" id="svc-pill"></span>
      <!-- ✅ FIX: aria-label sur le bouton alerte -->
      <a class="phone-btn" href="tel:+3261210440" title="Appeler la commune" aria-label="Appeler la commune">
      <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
    </a>
    <button class="alert-btn" id="alert-btn" onclick="envoyerAlerte()" aria-label="Signaler une urgence"><div class="alert-dot"></div><span id="alert-label">🚨 Urgent</span></button>
      <button class="reset-btn" id="reset-btn" onclick="resetChat()">← Retour</button>
    </div>
    <!-- ✅ FIX: aria-live + role="log" pour accessibilité lecteur d'écran -->
    <div class="msgs" id="messages" role="log" aria-live="polite" aria-label="Conversation">
      <div class="ts" id="ts-label">Aujourd'hui</div>
    </div>
    <div class="input-bar">
      <textarea id="chat-input" placeholder="Posez votre question..." rows="1" aria-label="Votre message"></textarea>
      <!-- ✅ FIX: aria-label sur le bouton envoyer -->
      <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="Envoyer">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</main>

<!-- FOOTER -->
<div class="page-footer">
  <div class="foot-chip">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-8v4h4l-5 8z"/></svg>
    Propuls&eacute; par Gemini IA
  </div>
  <div class="foot-chip">
    <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
    <a href="tel:+3261210440">+32 61 21 04 40</a>
  </div>
  <div class="foot-chip">
    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
    <a href="mailto:info@sainte-ode.be">info@sainte-ode.be</a>
  </div>
</div>

<!-- Modal alerte — overlay div fixe (compatible tous navigateurs mobiles) -->
<div id="alert-overlay" role="dialog" aria-modal="true" aria-labelledby="alert-dlg-title" onclick="if(event.target===this)fermerModal()">
  <div id="alert-dialog"></div>
</div>

/* ═══ FORMATAGE TEXTE ═══ */
/* ✅ FIX: regex listes remplacé par un accumulateur ligne par ligne — robuste et sans <ul> imbriqués */
function fmt(t) {
  // 1. Formatage inline
  let s = t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/(?<![">])(https?:\/\/[^\s<"]+)/g, u => '<a href="'+u+'" target="_blank" rel="noopener">'+u+'</a>')
    // ✅ Numéros de téléphone belges cliquables
    .replace(/(\+32[\s.\-\/]?\d{2}[\s.\-\/]?\d{2}[\s.\-\/]?\d{2}[\s.\-\/]?\d{2}|\b0\d{1,3}[\s.\-\/]?\d{2}[\s.\-\/]?\d{2}[\s.\-\/]?\d{2})/g, function(p) {
      var tel = p.replace(/[\s.\-\/]/g, '');
      var intl = tel.startsWith('0') ? '+32' + tel.slice(1) : tel;
      return '<a href="tel:' + intl + '" style="white-space:nowrap;color:inherit;text-decoration:underline">' + p + '</a>';
    });

  // 2. Regroupement des lignes en listes <ul> propres
  const lines = s.split('\n');
  const out = [];
  let inList = false;
  for (const line of lines) {
    const m = line.match(/^[-•] (.+)$/);
    if (m) {
      if (!inList) { inList = true; out.push('<ul><li>' + m[1] + '</li>'); }
      else { out[out.length - 1] += '<li>' + m[1] + '</li>'; }
    } else {
      if (inList) { out[out.length - 1] += '</ul>'; inList = false; }
      out.push(line);
    }
  }
  if (inList) out[out.length - 1] += '</ul>';

  // 3. Sauts de ligne résiduels → <br>
  return out.join('\n')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

  // [jourSemaine(0=dim)]: [[hDebut,mDebut,hFin,mFin], ...]

function updateHoraires() {
  const now = new Date();
  const jour = now.getDay();
  const h = now.getHours();
  const m = now.getMinutes();
  const totalMin = h * 60 + m;
  const banner = document.getElementById('horaires-banner');
  const txt = document.getElementById('horaires-text');
  /* ✅ FIX: utilisation de lang (variable unique) au lieu de window.lang */
  const l = lang;
  const plages = HORAIRES[jour] || [];

  for (const [hD,mD,hF,mF] of plages) {
    const debut = hD*60+mD, fin = hF*60+mF;
    if (totalMin >= debut && totalMin < fin) {
      const fermetureMin = fin - totalMin;
      const statut = fermetureMin <= 30 ? 'bientot' : 'ouvert';
      banner.className = 'horaires-banner ' + statut;
      if (statut === 'ouvert') {
        txt.textContent = (HORAIRES_MSG.ouvert[l]||HORAIRES_MSG.ouvert.fr) + hF+'h'+(mF===0?'00':mF);
      } else {
        txt.textContent = HORAIRES_MSG.bientot[l]||HORAIRES_MSG.bientot.fr;
      }
      return;
    }
  }

  // Fermé — vérifier d'abord si une plage s'ouvre encore AUJOURD'HUI
  const prochainAujourdHui = plages.find(function(p){ return p[0]*60+p[1] > totalMin; });
  if (prochainAujourdHui) {
    const hD = prochainAujourdHui[0], mD = prochainAujourdHui[1];
    const ouvreDans = hD*60+mD - totalMin;
    // Jaune si ouverture dans moins de 30 min, sinon orange "fermé"
    banner.className = 'horaires-banner ' + (ouvreDans <= 30 ? 'bientot' : 'ferme');
    const hStr = hD + 'h' + (mD === 0 ? '00' : String(mD).padStart(2,'0'));
    txt.textContent = (HORAIRES_MSG.aujourdhui[l]||HORAIRES_MSG.aujourdhui.fr) + hStr;
    return;
  }

  // Fermé — trouver prochaine ouverture (jour suivant)
  banner.className = 'horaires-banner ferme';
  let prochainMsg = '';
  if (jour >= 1 && jour <= 4) {
    prochainMsg = HORAIRES_MSG.demain[l]||HORAIRES_MSG.demain.fr;
  } else {
    prochainMsg = HORAIRES_MSG.lundi[l]||HORAIRES_MSG.lundi.fr;
  }
  txt.textContent = (HORAIRES_MSG.ferme[l]||HORAIRES_MSG.ferme.fr) + prochainMsg;
}

  html += '<div style="display:flex;flex-direction:column;gap:7px">';

    const label = item[l] || item.fr;
    html += '<button class="alert-item-btn" onclick="confirmerAlerte(\''+item.id+'\')">';
    html += '<span style="font-size:18px">'+item.icon+'</span><span>'+label+'</span>';

function fermerModal() {
  const overlay = document.getElementById('alert-overlay');
  if (overlay) overlay.classList.remove('open');
  document.body.style.overflow = '';
}

function confirmerAlerte(itemId) {
  const l = lang;
  const item = ALERT_ITEMS.find(i => i.id === itemId);
  if (!item) return;
  fermerModal();
  const label = item[l] || item.fr;
  const sujet = encodeURIComponent('🚨 Alerte — '+item.icon+' '+label+' — Chatbot Ode');
  const corps = encodeURIComponent((ALERT_UI.corps[l]||ALERT_UI.corps.fr)+' : '+item.icon+' '+label+'.\n\n⚠️ Merci de traiter cette alerte rapidement.');
  // ✅ FIX: location.href au lieu de window.open() — fiable sur tous les navigateurs mobiles

}
